<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Platform - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #10b981 0%, #ffffff 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #065f46;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            color: #047857;
        }

        .chat-area {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message.system {
            justify-content: center;
            text-align: center;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.ai .message-bubble {
            background: linear-gradient(135deg, #d1fae5 0%, #ffffff 100%);
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
        }

        .message.system .message-bubble {
            background: #fef3c7;
            color: #92400e;
            font-size: 12px;
            max-width: 90%;
        }

        .message.loading .message-bubble {
            background: linear-gradient(135deg, #d1fae5 0%, #ffffff 100%);
            color: #059669;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Spinner Animation */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #d1fae5;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            animation: bounce 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .input-area {
            padding: 20px;
            background: white;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="text"],
        input[type="file"] {
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #10b981;
        }

        input[type="text"] {
            flex: 1;
        }

        input[type="file"] {
            flex: 1;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .file-info {
            font-size: 12px;
            color: #6b7280;
            padding: 8px 0;
        }

        .attachments {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .attachment-tag {
            background: #d1fae5;
            color: #065f46;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .attachment-tag button {
            background: none;
            border: none;
            color: #065f46;
            cursor: pointer;
            padding: 0;
            margin-left: 4px;
            font-weight: bold;
            font-size: 16px;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .config-panel {
            background: #f0fdf4;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            border: 1px solid #bbf7d0;
        }

        .config-panel p {
            margin: 4px 0;
            word-break: break-all;
        }

        .label {
            font-weight: 600;
            color: #065f46;
        }

        /* Responsive Design for Mobile and Tablet */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                max-width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                border-radius: 0;
            }

            .header {
                padding: 16px;
            }

            .header h1 {
                font-size: 22px;
                margin-bottom: 4px;
            }

            .header p {
                font-size: 12px;
            }

            .chat-area {
                flex: 1;
                height: auto;
                padding: 12px;
            }

            .message-bubble {
                max-width: 85%;
                padding: 10px 12px;
                font-size: 13px;
            }

            .input-area {
                padding: 12px;
            }

            .input-group {
                flex-direction: column;
                gap: 8px;
            }

            input[type="text"],
            input[type="file"],
            button {
                width: 100%;
                padding: 12px;
                font-size: 14px;
            }

            .config-panel {
                padding: 10px;
                font-size: 11px;
            }

            .attachments {
                gap: 6px;
            }

            .attachment-tag {
                font-size: 11px;
                padding: 5px 8px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 18px;
            }

            .header p {
                font-size: 11px;
            }

            .chat-area {
                padding: 8px;
            }

            .message-bubble {
                max-width: 90%;
                padding: 8px 10px;
                font-size: 12px;
            }

            .input-area {
                padding: 10px;
            }

            input[type="text"],
            input[type="file"],
            button {
                padding: 10px;
                font-size: 13px;
            }

            .config-panel p {
                font-size: 10px;
            }

            .file-info {
                font-size: 11px;
            }
        }

        /* Landscape mode on mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                height: 100vh;
            }

            .header {
                padding: 12px;
            }

            .header h1 {
                font-size: 18px;
                margin-bottom: 2px;
            }

            .header p {
                font-size: 11px;
            }

            .chat-area {
                height: auto;
                flex: 1;
                padding: 10px;
            }

            .input-area {
                padding: 10px;
            }

            .config-panel {
                padding: 8px;
                margin-bottom: 8px;
                font-size: 10px;
            }
        }

        /* Tablet specific */
        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 700px;
            }

            .chat-area {
                height: 500px;
            }
        }

        /* Large desktop */
        @media (min-width: 1440px) {
            .container {
                max-width: 700px;
            }

            .chat-area {
                height: 550px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Chatbot Platform - Demo</h1>
            <p>Experience our platform's capabilities</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message system">
                <div class="message-bubble">
                    Welcome! Ask me about our AI Chatbot Platform features, automation capabilities, or how to get started.
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="config-panel">
                <p><span class="label">Mode:</span> Anonymous Platform Demo</p>
                <p><span class="label">Session:</span> <span id="sessionIdDisplay">Loading...</span></p>
            </div>

            <div id="messageArea"></div>

            <div class="input-group">
                <input type="text" 
                       id="messageInput" 
                       placeholder="Ask about our platform features..."
                       onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn">Send</button>
            </div>

            <div class="input-group">
                <input type="file" 
                       id="fileInput" 
                       multiple
                       accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xlsx,.txt">
                <button onclick="uploadFiles()" id="uploadBtn">Upload</button>
            </div>

            <div class="file-info" id="fileInfo"></div>
            <div class="attachments" id="attachmentsList"></div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = '/v1/api/n8n/anonymous';
        let sessionId = generateSessionId();
        let uploadedFiles = [];
        let isProcessing = false;

        function generateSessionId() {
            return `demo_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();

            if (!message) {
                addSystemMessage('Please enter a message');
                return;
            }

            if (isProcessing) {
                addSystemMessage('Please wait for the current message to complete');
                return;
            }

            // Disable inputs
            isProcessing = true;
            messageInput.disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('uploadBtn').disabled = true;

            try {
                // Add user message
                addUserMessage(message);
                messageInput.value = '';

                // Show loading spinner
                const loadingId = addLoadingMessage();

                // Prepare file attachments
                const fileAttachments = uploadedFiles.map(file => ({
                    name: file.name,
                    type: file.type,
                    size: file.size,
                    fileId: file.fileId
                }));

                // Send to API
                const response = await fetch(`${API_BASE_URL}/chat/generic`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        sessionId: sessionId,
                        role: 'user',
                        fileAttachments: fileAttachments.length > 0 ? fileAttachments : null
                    })
                });

                // Remove loading spinner
                removeLoadingMessage(loadingId);

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    addAIMessage(data.result || data.response || 'Response received');
                } else {
                    addSystemMessage(`Error: ${data.error || 'Unknown error'}`);
                }

                // Clear uploaded files after successful send
                uploadedFiles = [];
                updateFileInfo();

            } catch (error) {
                removeLoadingMessage('loading-msg');
                addSystemMessage(`Error: ${error.message}`);
                console.error('Send error:', error);
            } finally {
                isProcessing = false;
                messageInput.disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('uploadBtn').disabled = false;
                messageInput.focus();
            }
        }

        async function uploadFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = Array.from(fileInput.files);

            if (files.length === 0) {
                addSystemMessage('Please select at least one file');
                return;
            }

            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                for (const file of files) {
                    addSystemMessage(`Uploading ${file.name}...`);

                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch('/v1/api/user/attachments/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        const data = await response.json();
                        uploadedFiles.push({
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            fileId: data.fileId
                        });
                        addSystemMessage(`${file.name} uploaded successfully`);
                    } else {
                        addSystemMessage(`Failed to upload ${file.name}`);
                    }
                }

                updateFileInfo();
                fileInput.value = '';

            } catch (error) {
                addSystemMessage(`Upload error: ${error.message}`);
            } finally {
                document.getElementById('uploadBtn').disabled = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function updateFileInfo() {
            const fileInfoDiv = document.getElementById('fileInfo');
            const attachmentsDiv = document.getElementById('attachmentsList');

            if (uploadedFiles.length === 0) {
                fileInfoDiv.textContent = '';
                attachmentsDiv.innerHTML = '';
                return;
            }

            fileInfoDiv.textContent = `${uploadedFiles.length} file(s) attached`;

            attachmentsDiv.innerHTML = uploadedFiles.map((file, idx) => `
                <div class="attachment-tag">
                    ${file.name}
                    <button onclick="removeFile(${idx})">×</button>
                </div>
            `).join('');
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            updateFileInfo();
        }

        function addUserMessage(text) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            messageDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addAIMessage(text) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addSystemMessage(text) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system';
            messageDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addLoadingMessage() {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.id = 'loading-msg';
            messageDiv.className = 'message ai loading';
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="spinner"></div>
                    <span>Thinking</span>
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return 'loading-msg';
        }

        function removeLoadingMessage(id) {
            const loadingMsg = document.getElementById(id);
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // Initialize on page load
        window.onload = () => {
            document.getElementById('sessionIdDisplay').textContent = sessionId;
            document.getElementById('messageInput').focus();
            console.log('Platform Demo Chat initialized - Session:', sessionId);
        };
    </script>
</body>
</html>
